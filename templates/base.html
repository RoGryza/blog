<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <!-- metadata boilerplate -->
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>{{ config.title }}</title>
  <meta name="author" content="{{ config.extra.author }}">
  <meta name="description" content="{{ config.description }}">

  <link rel="alternate" type="application/atom+xml" href="/atom.xml">
  <link rel="stylesheet" type="text/css" href="/css/normalize.css">
  <link rel="stylesheet" type="text/css" href="/css/index.css">
</head>

<body>
  <header>
    <span class="title"><a href="/">{{ config.title }}</a></span>
    <nav>
      <ul class="main-nav-links">
        <li><a href="/now">/now</a></li>
        <li><a href="/">Home</a></li>
        <li><a href="/posts">Archive</a></li>
        <li><a href="/tags">Tags</a></li>
        <li><a href="/about">About Me</a></li>
      </ul>
      <ul class="main-nav-social">
        <li><a href="https://github.com/RoGryza">github</a></li>
        <li><a href="https://twitter.com/RodrigoGryzins1">twitter</a></li>
        <li><a rel="alternate" type="application/atom+xml" href="/atom.xml">rss</a></li>
      </ul>
    </nav>
  </header>

  {% block content %} {% endblock %}

  <footer>
    <div>Created with <a href="https://www.getzola.org">zola</a></div>
    <a rel="license" href="http://creativecommons.org/licenses/by/4.0/"><img alt="Creative Commons License" style="border-width:0" src="https://i.creativecommons.org/l/by/4.0/80x15.png" /></a><br />This work is licensed under a <a rel="license" href="http://creativecommons.org/licenses/by/4.0/">Creative Commons Attribution 4.0 International License</a>.
  </footer>
</body>
